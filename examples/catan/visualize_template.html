<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Catan Game Replay</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
#header { display: flex; align-items: center; justify-content: center; gap: 24px; padding: 10px 20px; background: #16213e; border-bottom: 1px solid #0f3460; }
#header .bot-name { font-size: 18px; font-weight: 600; }
#header .bot-name.p1 { color: #e74c3c; }
#header .bot-name.p2 { color: #3498db; }
#header .vs { color: #888; font-size: 14px; }
#header .result { font-size: 14px; color: #f0c040; margin-left: 16px; }
#main { flex: 1; display: flex; overflow: hidden; }
#board-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 10px; }
#board { width: 100%; height: 100%; max-width: 700px; max-height: 600px; }
#panels { width: 280px; padding: 12px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; border-left: 1px solid #0f3460; }
.player-panel { background: #16213e; border-radius: 8px; padding: 12px; border: 2px solid transparent; }
.player-panel.p1 { border-color: #e74c3c44; }
.player-panel.p2 { border-color: #3498db44; }
.player-panel.active { border-color: #f0c040; }
.panel-name { font-weight: 600; font-size: 15px; margin-bottom: 8px; }
.panel-name.p1 { color: #e74c3c; }
.panel-name.p2 { color: #3498db; }
.panel-row { display: flex; justify-content: space-between; font-size: 13px; margin: 3px 0; }
.panel-row .label { color: #999; }
.panel-row .value { font-weight: 500; }
.resources { display: flex; gap: 4px; margin: 6px 0; }
.res-chip { padding: 2px 6px; border-radius: 4px; font-size: 12px; font-weight: 600; color: #fff; min-width: 22px; text-align: center; }
.res-lumber { background: #2d5a27; }
.res-brick { background: #b85c38; }
.res-wool { background: #7ec850; color: #1a3a10; }
.res-grain { background: #e8b430; color: #5a4000; }
.res-ore { background: #7a7a7a; }
.dev-cards { display: flex; gap: 4px; margin: 4px 0; flex-wrap: wrap; }
.dc-chip { padding: 1px 5px; border-radius: 3px; font-size: 11px; font-weight: 600; background: #2a2a4a; color: #ccc; }
.dc-chip.has { background: #3a2a5a; color: #d0b0ff; }
.awards { font-size: 12px; color: #ccc; margin-top: 4px; }
.award-badge { display: inline-block; padding: 1px 6px; border-radius: 3px; background: #f0c04033; color: #f0c040; margin-right: 4px; }
#controls { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 10px; background: #16213e; border-top: 1px solid #0f3460; }
#controls button { background: #0f3460; color: #e0e0e0; border: 1px solid #1a5276; border-radius: 6px; padding: 6px 14px; cursor: pointer; font-size: 16px; }
#controls button:hover { background: #1a5276; }
#controls button:active { background: #2471a3; }
#frame-counter { font-size: 14px; min-width: 100px; text-align: center; color: #999; }
#action-log { flex: 1; background: #111827; border-radius: 8px; overflow-y: auto; padding: 6px 8px; font-size: 12px; font-family: 'Consolas', 'Monaco', monospace; line-height: 1.5; min-height: 0; }
.log-entry { color: #777; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 1px 4px; border-radius: 3px; }
.log-entry.current { background: #1e293b; color: #e0e0e0; font-weight: 600; }
.log-entry .log-p1 { color: #e74c3c; }
.log-entry .log-p2 { color: #3498db; }
.log-entry.current .log-p1 { color: #f87171; }
.log-entry.current .log-p2 { color: #60a5fa; }
.log-detail { padding-left: 16px; font-size: 11px; color: #666; font-weight: normal; }
.log-detail .log-p1 { color: #c0392b; }
.log-detail .log-p2 { color: #2980b9; }
#turn-info { text-align: center; padding: 2px; font-size: 12px; color: #888; }
.hex-label { font-size: 14px; font-weight: 700; text-anchor: middle; dominant-baseline: central; pointer-events: none; }
.hex-label.hot { fill: #d32f2f; }
.hex-label.normal { fill: #333; }
.port-label { font-size: 9px; fill: #ddd; text-anchor: middle; dominant-baseline: central; pointer-events: none; }
</style>
</head>
<body>
<div id="header">
  <span class="bot-name p1" id="bot1-name"></span>
  <span class="vs">vs</span>
  <span class="bot-name p2" id="bot2-name"></span>
  <span class="result" id="result-text"></span>
</div>
<div id="main">
  <div id="board-container">
    <svg id="board" viewBox="-300 -260 600 520">
      <defs>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
          <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.3"/>
        </filter>
      </defs>
      <g id="ocean-bg"></g>
      <g id="hex-layer"></g>
      <g id="port-layer"></g>
      <g id="road-layer"></g>
      <g id="building-layer"></g>
      <g id="robber-layer"></g>
    </svg>
  </div>
  <div id="panels">
    <div class="player-panel p1" id="panel-p1">
      <div class="panel-name p1" id="panel-p1-name"></div>
      <div class="resources" id="res-p1"></div>
      <div class="panel-row"><span class="label">Victory Points</span><span class="value" id="vp-p1">0</span></div>
      <div class="dev-cards" id="dc-p1"></div>
      <div class="panel-row"><span class="label">Knights Played</span><span class="value" id="kn-p1">0</span></div>
      <div class="awards" id="awards-p1"></div>
    </div>
    <div class="player-panel p2" id="panel-p2">
      <div class="panel-name p2" id="panel-p2-name"></div>
      <div class="resources" id="res-p2"></div>
      <div class="panel-row"><span class="label">Victory Points</span><span class="value" id="vp-p2">0</span></div>
      <div class="dev-cards" id="dc-p2"></div>
      <div class="panel-row"><span class="label">Knights Played</span><span class="value" id="kn-p2">0</span></div>
      <div class="awards" id="awards-p2"></div>
    </div>
    <div id="action-log"></div>
  </div>
</div>
<div id="turn-info"></div>
<div id="controls">
  <button id="btn-first" title="First (Home)">&#x23EE;</button>
  <button id="btn-prev" title="Previous (Left)">&#x25C0;</button>
  <span id="frame-counter">0 / 0</span>
  <button id="btn-next" title="Next (Right)">&#x25B6;</button>
  <button id="btn-last" title="Last (End)">&#x23ED;</button>
</div>

<script>
const DATA = "__REPLAY_DATA__";

const TERRAIN_COLORS = {
  forest: '#2d5a27', hills: '#b85c38', pasture: '#7ec850',
  fields: '#e8b430', mountains: '#7a7a7a', desert: '#d4c088'
};
const TERRAIN_STROKE = {
  forest: '#1e4a1a', hills: '#8a4428', pasture: '#5aa835',
  fields: '#c09020', mountains: '#5a5a5a', desert: '#b0a068'
};
const PLAYER_COLORS = ['#e74c3c', '#3498db'];
const PLAYER_DARK = ['#c0392b', '#2980b9'];
const RES_NAMES = ['Lumber', 'Brick', 'Wool', 'Grain', 'Ore'];
const RES_CLASSES = ['lumber', 'brick', 'wool', 'grain', 'ore'];
const PORT_COLORS = { generic: '#ffffff', lumber: '#2d5a27', brick: '#b85c38', wool: '#7ec850', grain: '#e8b430', ore: '#7a7a7a' };

const HEX_SIZE = 50;
const SQRT3 = Math.sqrt(3);

let currentFrame = 0;

function svgEl(tag, attrs) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k, v] of Object.entries(attrs || {})) el.setAttribute(k, v);
  return el;
}

function hexPoints(cx, cy) {
  const pts = [];
  for (let i = 0; i < 6; i++) {
    const angle = Math.PI / 3 * i - Math.PI / 2;
    pts.push(`${(cx + HEX_SIZE * Math.cos(angle)).toFixed(1)},${(cy + HEX_SIZE * Math.sin(angle)).toFixed(1)}`);
  }
  return pts.join(' ');
}

function drawBoard() {
  const board = DATA.board;

  // Ocean background
  const ocean = document.getElementById('ocean-bg');
  ocean.appendChild(svgEl('rect', { x: -300, y: -260, width: 600, height: 520, fill: '#1a5276', rx: 10 }));

  // Hex tiles
  const hexLayer = document.getElementById('hex-layer');
  for (const tile of board.tiles) {
    const g = svgEl('g');

    // Hex polygon
    g.appendChild(svgEl('polygon', {
      points: hexPoints(tile.cx, tile.cy),
      fill: TERRAIN_COLORS[tile.terrain],
      stroke: TERRAIN_STROKE[tile.terrain],
      'stroke-width': 2
    }));

    // Number token
    if (tile.number != null) {
      const isHot = tile.number === 6 || tile.number === 8;
      g.appendChild(svgEl('circle', {
        cx: tile.cx, cy: tile.cy, r: 14,
        fill: '#faf0d0', stroke: '#a09060', 'stroke-width': 1
      }));
      const txt = svgEl('text', {
        x: tile.cx, y: tile.cy,
        class: 'hex-label ' + (isHot ? 'hot' : 'normal')
      });
      txt.textContent = tile.number;
      g.appendChild(txt);

      // Probability dots
      const dots = [0, 0, 1, 2, 3, 4, 5, 0, 5, 4, 3, 2, 1][tile.number] || 0;
      if (dots > 0) {
        const dotY = tile.cy + 10;
        const startX = tile.cx - (dots - 1) * 3;
        for (let d = 0; d < dots; d++) {
          g.appendChild(svgEl('circle', {
            cx: startX + d * 6, cy: dotY, r: 1.5,
            fill: isHot ? '#d32f2f' : '#666'
          }));
        }
      }
    }

    hexLayer.appendChild(g);
  }

  // Ports
  const portLayer = document.getElementById('port-layer');
  for (const port of board.ports) {
    const [n0, n1] = port.nodes;
    const p0 = board.nodes[n0], p1 = board.nodes[n1];
    const mx = (p0[0] + p1[0]) / 2, my = (p0[1] + p1[1]) / 2;

    // Direction outward from board center
    const dist = Math.sqrt(mx * mx + my * my);
    const ox = dist > 0 ? mx / dist * 20 : 0;
    const oy = dist > 0 ? my / dist * 20 : 0;
    const px = mx + ox, py = my + oy;

    // Line from midpoint to port marker
    portLayer.appendChild(svgEl('line', {
      x1: p0[0], y1: p0[1], x2: p1[0], y2: p1[1],
      stroke: PORT_COLORS[port.kind], 'stroke-width': 3, opacity: 0.6
    }));

    // Port circle
    const color = PORT_COLORS[port.kind];
    portLayer.appendChild(svgEl('circle', {
      cx: px, cy: py, r: 10,
      fill: port.kind === 'generic' ? '#334' : color,
      stroke: color, 'stroke-width': 1.5, opacity: 0.85
    }));

    // Port label
    const label = port.kind === 'generic' ? '3:1' : '2:1';
    const txt = svgEl('text', { x: px, y: py, class: 'port-label' });
    txt.textContent = label;
    portLayer.appendChild(txt);
  }
}

function updateFrame(idx) {
  currentFrame = Math.max(0, Math.min(idx, DATA.frames.length - 1));
  const frame = DATA.frames[currentFrame];
  const board = DATA.board;

  // Roads
  const roadLayer = document.getElementById('road-layer');
  roadLayer.innerHTML = '';
  for (let p = 0; p < 2; p++) {
    for (const eid of frame.buildings[p].roads) {
      const [n0, n1] = board.edges[eid];
      const p0 = board.nodes[n0], p1 = board.nodes[n1];
      roadLayer.appendChild(svgEl('line', {
        x1: p0[0], y1: p0[1], x2: p1[0], y2: p1[1],
        stroke: PLAYER_COLORS[p], 'stroke-width': 6,
        'stroke-linecap': 'round', opacity: 0.9
      }));
    }
  }

  // Buildings
  const buildingLayer = document.getElementById('building-layer');
  buildingLayer.innerHTML = '';
  for (let p = 0; p < 2; p++) {
    // Settlements (house shape)
    for (const nid of frame.buildings[p].settlements) {
      const [x, y] = board.nodes[nid];
      const path = svgEl('path', {
        d: `M${x},${y - 9} L${x + 7},${y - 2} L${x + 7},${y + 7} L${x - 7},${y + 7} L${x - 7},${y - 2} Z`,
        fill: PLAYER_COLORS[p], stroke: PLAYER_DARK[p], 'stroke-width': 1.5, filter: 'url(#shadow)'
      });
      buildingLayer.appendChild(path);
    }
    // Cities (larger shape with tower)
    for (const nid of frame.buildings[p].cities) {
      const [x, y] = board.nodes[nid];
      const path = svgEl('path', {
        d: `M${x - 4},${y - 11} L${x + 2},${y - 11} L${x + 2},${y - 4} L${x + 9},${y - 4} L${x + 9},${y + 8} L${x - 9},${y + 8} L${x - 9},${y - 4} L${x - 4},${y - 4} Z`,
        fill: PLAYER_COLORS[p], stroke: PLAYER_DARK[p], 'stroke-width': 1.5, filter: 'url(#shadow)'
      });
      buildingLayer.appendChild(path);
    }
  }

  // Robber
  const robberLayer = document.getElementById('robber-layer');
  robberLayer.innerHTML = '';
  const robberTile = board.tiles[frame.robber];
  if (robberTile) {
    robberLayer.appendChild(svgEl('circle', {
      cx: robberTile.cx, cy: robberTile.cy, r: 12,
      fill: 'rgba(30,30,30,0.85)', stroke: '#444', 'stroke-width': 2
    }));
    const txt = svgEl('text', {
      x: robberTile.cx, y: robberTile.cy,
      'text-anchor': 'middle', 'dominant-baseline': 'central',
      fill: '#ccc', 'font-size': '10', 'font-weight': '700', 'pointer-events': 'none'
    });
    txt.textContent = 'R';
    robberLayer.appendChild(txt);
  }

  // Player panels
  for (let p = 0; p < 2; p++) {
    const pf = frame.players[p];
    const suffix = p === 0 ? 'p1' : 'p2';

    // Resources
    const resEl = document.getElementById('res-' + suffix);
    resEl.innerHTML = '';
    for (let r = 0; r < 5; r++) {
      const chip = document.createElement('span');
      chip.className = 'res-chip res-' + RES_CLASSES[r];
      chip.textContent = pf.hand[r];
      chip.title = RES_NAMES[r];
      resEl.appendChild(chip);
    }

    document.getElementById('vp-' + suffix).textContent = pf.vp;

    // Dev cards (per-type breakdown)
    const dcEl = document.getElementById('dc-' + suffix);
    dcEl.innerHTML = '';
    const DC_LABELS = ['Kn', 'VP', 'RB', 'YoP', 'Mo'];
    const DC_TITLES = ['Knight', 'Victory Point', 'Road Building', 'Year of Plenty', 'Monopoly'];
    const total = pf.dev_cards.reduce((a, b) => a + b, 0);
    if (total > 0) {
      for (let d = 0; d < 5; d++) {
        if (pf.dev_cards[d] > 0) {
          const chip = document.createElement('span');
          chip.className = 'dc-chip has';
          chip.title = DC_TITLES[d];
          chip.textContent = DC_LABELS[d] + ':' + pf.dev_cards[d];
          dcEl.appendChild(chip);
        }
      }
    }

    document.getElementById('kn-' + suffix).textContent = pf.knights;

    // Awards
    const awardsEl = document.getElementById('awards-' + suffix);
    awardsEl.innerHTML = '';
    if (frame.longest_road && frame.longest_road[0] === p) {
      awardsEl.innerHTML += `<span class="award-badge">Longest Road: ${frame.longest_road[1]}</span>`;
    }
    if (frame.largest_army && frame.largest_army[0] === p) {
      awardsEl.innerHTML += `<span class="award-badge">Largest Army: ${frame.largest_army[1]}</span>`;
    }

    // Active player highlight
    const panel = document.getElementById('panel-' + suffix);
    panel.classList.toggle('active', frame.player === p && currentFrame > 0);
  }

  // Controls
  document.getElementById('frame-counter').textContent = `${currentFrame} / ${DATA.frames.length - 1}`;
  document.getElementById('turn-info').textContent = `Turn ${frame.turn} \u2022 Phase: ${frame.phase}`;

  // Action log — show recent actions with current highlighted
  const logEl = document.getElementById('action-log');
  logEl.innerHTML = '';
  const start = Math.max(0, currentFrame - 30);
  for (let i = start; i <= currentFrame; i++) {
    const f = DATA.frames[i];
    const lines = f.action.split('\n');
    for (let li = 0; li < lines.length; li++) {
      const line = lines[li];
      const div = document.createElement('div');
      if (li === 0) {
        div.className = 'log-entry' + (i === currentFrame ? ' current' : '');
        if (line.startsWith('P1: ')) {
          div.innerHTML = '<span class="log-p1">P1:</span> ' + line.slice(4);
        } else if (line.startsWith('P2: ')) {
          div.innerHTML = '<span class="log-p2">P2:</span> ' + line.slice(4);
        } else {
          div.textContent = line;
        }
      } else {
        div.className = 'log-entry log-detail';
        if (line.startsWith('P1 ')) {
          div.innerHTML = '<span class="log-p1">P1</span>' + line.slice(2);
        } else if (line.startsWith('P2 ')) {
          div.innerHTML = '<span class="log-p2">P2</span>' + line.slice(2);
        } else {
          div.textContent = line;
        }
      }
      div.title = f.action;
      logEl.appendChild(div);
    }
  }
  logEl.scrollTop = logEl.scrollHeight;

}

function init() {
  document.getElementById('bot1-name').textContent = DATA.bot1;
  document.getElementById('bot2-name').textContent = DATA.bot2;
  document.getElementById('panel-p1-name').textContent = DATA.bot1;
  document.getElementById('panel-p2-name').textContent = DATA.bot2;
  document.getElementById('result-text').textContent = DATA.result;

  drawBoard();
  updateFrame(0);

  document.getElementById('btn-first').addEventListener('click', () => updateFrame(0));
  document.getElementById('btn-prev').addEventListener('click', () => updateFrame(currentFrame - 1));
  document.getElementById('btn-next').addEventListener('click', () => updateFrame(currentFrame + 1));
  document.getElementById('btn-last').addEventListener('click', () => updateFrame(DATA.frames.length - 1));

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') updateFrame(currentFrame - 1);
    else if (e.key === 'ArrowRight') updateFrame(currentFrame + 1);
    else if (e.key === 'Home') updateFrame(0);
    else if (e.key === 'End') updateFrame(DATA.frames.length - 1);
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
