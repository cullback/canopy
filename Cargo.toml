[package]
name = "canopy2"
version = "0.1.0"
edition = "2024"

[lib]
name = "canopy2"
path = "src/lib.rs"

[features]
cli = ["dep:clap"]

[dependencies]
clap = { version = "4", default-features = false, features = ["std", "string"], optional = true }
indicatif = "0.17"
rand = "0.9"
rand_distr = "0.5"

[dev-dependencies]
canopy2 = { path = ".", features = ["cli"] }

[[example]]
name = "pig"
path = "examples/pig.rs"
